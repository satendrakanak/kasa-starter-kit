name: CI

on:
  pull_request:

jobs:
  client:
    name: Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

  server:
    name: Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npx eslint "{src,apps,libs,test}/**/*.ts"

      - name: Test
        run: npm test -- --runInBand

      - name: Build
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - client
      - server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: server
          target: production
          push: false

      - name: Build client image
        uses: docker/build-push-action@v6
        with:
          context: client
          target: production
          push: false
          build-args: |
            NEXT_PUBLIC_APP_URL=http://localhost:3000
            NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
