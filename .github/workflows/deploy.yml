name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  client-check:
    name: Client Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_API_BASE_URL: http://server:8000

  server-check:
    name: Server Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npx eslint "{src,apps,libs,test}/**/*.ts"

      - name: Test
        run: npm test -- --runInBand

      - name: Build
        run: npm run build

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs:
      - client-check
      - server-check
    permissions:
      contents: read
      packages: write
    outputs:
      server_image: ${{ steps.meta.outputs.server_image }}
      client_image: ${{ steps.meta.outputs.client_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        run: |
          repo="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "server_image=${REGISTRY}/${repo}-server:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "server_image_latest=${REGISTRY}/${repo}-server:latest" >> "$GITHUB_OUTPUT"
          echo "client_image=${REGISTRY}/${repo}-client:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "client_image_latest=${REGISTRY}/${repo}-client:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: server
          target: production
          push: true
          tags: |
            ${{ steps.meta.outputs.server_image }}
            ${{ steps.meta.outputs.server_image_latest }}

      - name: Build and push client
        uses: docker/build-push-action@v6
        with:
          context: client
          target: production
          push: true
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_API_BASE_URL=http://server:8000
          tags: |
            ${{ steps.meta.outputs.client_image }}
            ${{ steps.meta.outputs.client_image_latest }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          SERVER_IMAGE: ${{ needs.build-and-push.outputs.server_image }}
          CLIENT_IMAGE: ${{ needs.build-and-push.outputs.client_image }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: SERVER_IMAGE,CLIENT_IMAGE,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            export SERVER_IMAGE="$SERVER_IMAGE"
            export CLIENT_IMAGE="$CLIENT_IMAGE"
            docker compose --env-file .env.production -f docker-compose.prod.yml pull
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d --no-build --remove-orphans
            docker image prune -f
